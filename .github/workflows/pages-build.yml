name: Pages build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-auth-secret-at-least-32-characters
      NEXTAUTH_SECRET: ci-auth-secret-at-least-32-characters
      NEXTAUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://user:password@example.com:5432/db?sslmode=require
      COMFYUI_API_URL: http://localhost:8188
      R2_ACCOUNT_ID: ci-account-id
      R2_ACCESS_KEY_ID: ci-access-key-id
      R2_SECRET_ACCESS_KEY: ci-secret-access-key
      R2_BUCKET_NAME: comfyui-saas-images
      R2_PUBLIC_URL: https://example.r2.dev
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

      - name: Build Cloudflare Pages output
        run: npm run pages:build
